server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_static on;
    brotli_static on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        image/svg+xml
        text/css
        text/javascript
        text/plain;

    location = /health {
        access_log off;
        return 200 "ok\n";
    }

    location = /robots.txt {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        add_header X-Robots-Tag "noindex, nofollow, noarchive";
        try_files /robots.txt =404;
    }

    location = /api {
        proxy_pass ${WEBAPP_BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name ${WEBAPP_BACKEND_UPSTREAM_HOST_VALUE};
        proxy_set_header Host ${WEBAPP_BACKEND_UPSTREAM_HOST_VALUE};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Minishop-Frontend-Host $host;
        proxy_set_header ${MINISHOP_EDGE_TOKEN_HEADER_VALUE} "${MINISHOP_EDGE_TOKEN_VALUE}";
    }

    location /api/ {
        proxy_pass ${WEBAPP_BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name ${WEBAPP_BACKEND_UPSTREAM_HOST_VALUE};
        proxy_set_header Host ${WEBAPP_BACKEND_UPSTREAM_HOST_VALUE};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Minishop-Frontend-Host $host;
        proxy_set_header ${MINISHOP_EDGE_TOKEN_HEADER_VALUE} "${MINISHOP_EDGE_TOKEN_VALUE}";
    }

    location = /auth {
        proxy_pass ${WEBAPP_BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name ${WEBAPP_BACKEND_UPSTREAM_HOST_VALUE};
        proxy_set_header Host ${WEBAPP_BACKEND_UPSTREAM_HOST_VALUE};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Minishop-Frontend-Host $host;
        proxy_set_header ${MINISHOP_EDGE_TOKEN_HEADER_VALUE} "${MINISHOP_EDGE_TOKEN_VALUE}";
    }

    location /auth/ {
        proxy_pass ${WEBAPP_BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name ${WEBAPP_BACKEND_UPSTREAM_HOST_VALUE};
        proxy_set_header Host ${WEBAPP_BACKEND_UPSTREAM_HOST_VALUE};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Minishop-Frontend-Host $host;
        proxy_set_header ${MINISHOP_EDGE_TOKEN_HEADER_VALUE} "${MINISHOP_EDGE_TOKEN_VALUE}";
    }

    location = /open-app {
        proxy_pass ${WEBAPP_BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name ${WEBAPP_BACKEND_UPSTREAM_HOST_VALUE};
        proxy_set_header Host ${WEBAPP_BACKEND_UPSTREAM_HOST_VALUE};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Minishop-Frontend-Host $host;
        proxy_set_header ${MINISHOP_EDGE_TOKEN_HEADER_VALUE} "${MINISHOP_EDGE_TOKEN_VALUE}";
    }

    location = /webapp-logo {
        proxy_pass ${WEBAPP_BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name ${WEBAPP_BACKEND_UPSTREAM_HOST_VALUE};
        proxy_set_header Host ${WEBAPP_BACKEND_UPSTREAM_HOST_VALUE};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Minishop-Frontend-Host $host;
        proxy_set_header ${MINISHOP_EDGE_TOKEN_HEADER_VALUE} "${MINISHOP_EDGE_TOKEN_VALUE}";
    }

    location = /webapp-default-logo.webp {
        proxy_pass ${WEBAPP_BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name ${WEBAPP_BACKEND_UPSTREAM_HOST_VALUE};
        proxy_set_header Host ${WEBAPP_BACKEND_UPSTREAM_HOST_VALUE};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Minishop-Frontend-Host $host;
        proxy_set_header ${MINISHOP_EDGE_TOKEN_HEADER_VALUE} "${MINISHOP_EDGE_TOKEN_VALUE}";
    }

    location ~ ^/(favicon\.ico|apple-touch-icon(?:-precomposed)?\.png|icon-(?:192|512)\.png)$ {
        proxy_pass ${WEBAPP_BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name ${WEBAPP_BACKEND_UPSTREAM_HOST_VALUE};
        proxy_set_header Host ${WEBAPP_BACKEND_UPSTREAM_HOST_VALUE};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Minishop-Frontend-Host $host;
        proxy_set_header ${MINISHOP_EDGE_TOKEN_HEADER_VALUE} "${MINISHOP_EDGE_TOKEN_VALUE}";
    }

    location ~ ^/(webapp-logo|webapp-uploaded-logo|webapp-favicon|webapp-theme-css|webapp-theme-assets)/ {
        proxy_pass ${WEBAPP_BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name ${WEBAPP_BACKEND_UPSTREAM_HOST_VALUE};
        proxy_set_header Host ${WEBAPP_BACKEND_UPSTREAM_HOST_VALUE};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Minishop-Frontend-Host $host;
        proxy_set_header ${MINISHOP_EDGE_TOKEN_HEADER_VALUE} "${MINISHOP_EDGE_TOKEN_VALUE}";
    }

    location ~ "^/(?:$|login/password$|home$|install$|trial$|s/[a-f0-9]{32}$|invite$|devices$|settings$|support(?:/[0-9]+)?$|admin(?:/.*)?$)" {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-Robots-Tag "noindex, nofollow, noarchive";
        try_files /index.html =404;
    }

    location ~* ^/subscription_webapp(_admin)?\.(min\.)?[0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f]\.(css|js)$ {
        expires off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Robots-Tag "noindex, nofollow, noarchive";
        try_files $uri =404;
    }

    location ~* ^/subscription_webapp_admin\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.js$ {
        expires off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Robots-Tag "noindex, nofollow, noarchive";
        try_files $uri =404;
    }

    location ~* ^/subscription_webapp(_admin)?\.(css|js)$ {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-Robots-Tag "noindex, nofollow, noarchive";
        try_files $uri =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Robots-Tag "noindex, nofollow, noarchive";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-Robots-Tag "noindex, nofollow, noarchive";
        try_files $uri /index.html;
    }
}
